<!DOCTYPE html>

<head>
    <title>Nation Navigator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-tr from-gray-100 to-gray-600 min-h-screen">
    <h1 class="text-center text-white text-3xl font-semibold mt-6 text-gray-800 hover:tracking-wide">
        🌏 Nation Navigator
    </h1>

    <div class="flex  justify-center mt-6 gap-3 px-4 ">
        <input id="searchinput" type="search" placeholder="Explore the atlas🗺️📍..."
            class="w-1/2 py-2 px-4 rounded-2xl border border-gray-300 focus:outline-none focus:ring-3 focus:ring-cyan-300 shadow-sm">
        <button id="searchBtn"
            class="px-5 py-2 bg-cyan-400 text-white rounded-2xl hover:bg-blue-600 transition">Search</button>
        <select id="searchRegion" class="px-3 py-2 rounded-xl border border-gray-300 shadow-sm">
            <option>Filter By Region</option>
            <option>Africa</option>
            <option>Asia</option>
            <option>America</option>
            <option>Europe</option>
            <option>Oceania</option>
            <option>Antartic</option>

        </select>
    </div>
    <div id="loading" class="hidden">Loading...</div>
    <div id="resultsContainer" class="hover:shadow-lg"></div>
    <div id="modal"
        class="inset-0 fixed hidden bg-black/40 flex items-center justify-center bg-black/40 backdrop-blur-sm flrx">

        <div class=" bg-gray-200 rounded-xl max-w-md relative p-6 x-80 shadow-xl ">
            <button id="closeModal"
                class="absolute top-0 right-5 text-xl tet-gray-500 hover:text-black">&times;</button>
            <p id="resultText" class="text-gray-700 py-2"></p>
            <div id="foodSection" class="mt-4"></div>
        </div>

    </div>

    <script src="app.js" defer></script>
</body>

</html>
